version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: kloset-db
    environment:
      POSTGRES_DB: kloset
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kloset_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Kloset/backend/internal/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


  # Go Backend (development)
  backend:
    build:
      context: ./Kloset/backend
      dockerfile: Dockerfile
    container_name: kloset-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./Kloset/backend:/app

  # Next.js Frontend (development)
  frontend:
    build:
      context: ./Kloset/frontend
      dockerfile: Dockerfile
    container_name: kloset-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
    depends_on:
      - backend
    volumes:
      - ./Kloset/frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
