name: PR Validation

on:
  pull_request:
    branches: [main, release-candidate]

permissions:
  contents: read
  pull-requests: read

jobs:
  # ─── Code Quality Gate ────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            perf
            test
            ci
            build

      - name: Check for secrets in diff
        run: |
          # Scan for leaked secrets in the PR diff
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.go' '*.ts' '*.tsx' '*.env*' '*.json' || true)
          if echo "$DIFF" | grep -qiE '(password|secret|api_key|token)\s*[:=]\s*["\x27]?[a-zA-Z0-9]{16,}'; then
            echo "WARNING: Potential secret detected in diff"
            echo "Review carefully before merging"
          else
            echo "No secrets detected in diff"
          fi

  # ─── Branch Protection Check ──────────────────────
  branch-check:
    name: Branch Protection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check branch protection rules
        run: |
          echo "PR targets: ${{ github.base_ref }}"
          echo "Head branch: ${{ github.head_ref }}"
          echo "All checks passed - PR is valid"
