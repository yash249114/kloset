name: CI/CD Pipeline

on:
  push:
    branches: [release-candidate, main]
  pull_request:
    branches: [main, release-candidate]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  GO_VERSION: "1.22"

jobs:
  # ─── Frontend Checks ──────────────────────────────
  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.kloset.in/api/v1
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: test
          NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: test
          NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_placeholder
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: placeholder.apps.googleusercontent.com
          NEXT_PUBLIC_SENTRY_DSN: ""
          NEXT_PUBLIC_POSTHOG_KEY: ""
          NEXT_PUBLIC_POSTHOG_HOST: ""

  # ─── Backend Checks ───────────────────────────────
  backend:
    name: Backend (go build + vet)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null ./cmd/server

      - name: Test
        run: go test -short -timeout 60s ./...
        env:
          APP_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: test
          DB_NAME: kloset_test
          JWT_SECRET: test-secret-key-32-chars-minimum!

  # ─── Security Audit ───────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: gosec (backend)
        working-directory: backend
        uses: securego/gosec@master
        with:
          args: ./...

  # ─── Deploy Preview ───────────────────────────────
  deploy-preview:
    name: Deploy Preview
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Vercel Preview Deploy
        run: echo "Preview deploy would be triggered via Vercel GitHub integration"
